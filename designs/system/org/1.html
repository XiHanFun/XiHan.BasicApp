<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>组织管理 - XiHan SaaS</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0c0f1a;
    --bg-base: #111628;
    --bg-card: #171d33;
    --bg-elevated: #1e2642;
    --bg-hover: #242d4a;
    --border-dim: rgba(255,255,255,0.06);
    --border-subtle: rgba(255,255,255,0.1);
    --border-accent: rgba(56,189,148,0.4);
    --text-primary: #e8ecf4;
    --text-secondary: #8892b0;
    --text-muted: #5a6380;
    --accent: #38bd94;
    --accent-light: #4dd4aa;
    --accent-dim: rgba(56,189,148,0.15);
    --amber: #f0a848;
    --amber-dim: rgba(240,168,72,0.15);
    --rose: #e85d75;
    --rose-dim: rgba(232,93,117,0.15);
    --sky: #4da6e8;
    --sky-dim: rgba(77,166,232,0.15);
    --violet: #9b7be8;
    --violet-dim: rgba(155,123,232,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
  }

  /* 背景氛围 */
  .atmosphere {
    position: fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 800px 600px at 15% 20%, rgba(56,189,148,0.06), transparent),
      radial-gradient(ellipse 600px 500px at 85% 75%, rgba(77,166,232,0.05), transparent),
      radial-gradient(ellipse 500px 400px at 50% 50%, rgba(155,123,232,0.03), transparent);
  }

  .app-container {
    position: relative; z-index:1;
    display: flex; flex-direction: column;
    height: 100vh;
  }

  /* 顶栏 */
  .top-bar {
    height: 56px;
    background: rgba(17,22,40,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-dim);
    display: flex; align-items: center;
    padding: 0 24px;
    flex-shrink: 0;
  }

  .top-bar-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 18px;
    background: linear-gradient(135deg, var(--accent-light), var(--sky));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .top-bar-divider {
    width: 1px; height: 20px;
    background: var(--border-subtle);
    margin: 0 16px;
  }

  .top-bar-breadcrumb {
    font-size: 13px; color: var(--text-secondary);
  }
  .top-bar-breadcrumb span { color: var(--text-muted); margin: 0 6px; }

  .top-bar-actions {
    margin-left: auto;
    display: flex; gap: 8px; align-items: center;
  }

  /* 主体 */
  .main-body {
    flex: 1; display: flex; overflow: hidden;
  }

  /* 侧边部门树 */
  .sidebar {
    width: 320px; flex-shrink:0;
    background: var(--bg-base);
    border-right: 1px solid var(--border-dim);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border-dim);
    flex-shrink:0;
  }

  .sidebar-header h3 {
    font-size: 14px; font-weight: 600; color: var(--text-primary);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar-header h3 i { color: var(--accent); font-size: 13px; }

  .search-box {
    position: relative;
  }
  .search-box input {
    width: 100%; height: 34px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-dim);
    border-radius: 8px;
    padding: 0 12px 0 34px;
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input::placeholder { color: var(--text-muted); }
  .search-box input:focus { border-color: var(--border-accent); }
  .search-box i {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 12px;
  }

  .tree-container {
    flex:1; overflow-y: auto; padding: 8px 8px 16px;
  }
  .tree-container::-webkit-scrollbar { width: 4px; }
  .tree-container::-webkit-scrollbar-track { background: transparent; }
  .tree-container::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius:4px; }

  .tree-node {
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.15s;
    user-select: none;
  }
  .tree-node:hover { background: var(--bg-hover); }
  .tree-node.active { background: var(--accent-dim); }

  .tree-node-content {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    height: 36px;
    font-size: 13px;
  }

  .tree-toggle {
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    transition: transform 0.2s;
    flex-shrink:0;
  }
  .tree-toggle.expanded { transform: rotate(90deg); }
  .tree-toggle.empty { visibility: hidden; }

  .tree-icon {
    width: 22px; height: 22px;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    flex-shrink:0;
  }

  .tree-label {
    flex:1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-primary);
    font-weight: 400;
  }
  .tree-node.active .tree-label { font-weight: 500; }

  .tree-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 500;
    flex-shrink:0;
  }

  .tree-children {
    padding-left: 20px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
  }
  .tree-children.open { max-height: 2000px; }

  /* 内容区 */
  .content-area {
    flex:1; overflow-y: auto; padding: 24px;
  }
  .content-area::-webkit-scrollbar { width: 5px; }
  .content-area::-webkit-scrollbar-track { background: transparent; }
  .content-area::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius:4px; }

  /* 统计卡片 */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .stat-card:hover {
    transform: translateY(-2px);
    border-color: var(--border-subtle);
  }

  .stat-card::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height: 2px;
    border-radius: 14px 14px 0 0;
  }
  .stat-card.c-accent::before { background: linear-gradient(90deg, var(--accent), var(--accent-light)); }
  .stat-card.c-amber::before { background: linear-gradient(90deg, var(--amber), #f4c264); }
  .stat-card.c-sky::before { background: linear-gradient(90deg, var(--sky), #6fc0f4); }
  .stat-card.c-violet::before { background: linear-gradient(90deg, var(--violet), #b99ef0); }

  .stat-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    margin-bottom: 14px;
  }
  .c-accent .stat-icon { background: var(--accent-dim); color: var(--accent-light); }
  .c-amber .stat-icon { background: var(--amber-dim); color: var(--amber); }
  .c-sky .stat-icon { background: var(--sky-dim); color: var(--sky); }
  .c-violet .stat-icon { background: var(--violet-dim); color: var(--violet); }

  .stat-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px; font-weight: 700;
    margin-bottom: 4px;
  }
  .c-accent .stat-value { color: var(--accent-light); }
  .c-amber .stat-value { color: var(--amber); }
  .c-sky .stat-value { color: var(--sky); }
  .c-violet .stat-value { color: var(--violet); }

  .stat-label {
    font-size: 12px; color: var(--text-muted);
  }

  .stat-trend {
    position: absolute; top: 18px; right: 18px;
    font-size: 11px; font-weight: 500;
    display: flex; align-items: center; gap: 3px;
  }
  .stat-trend.up { color: var(--accent); }
  .stat-trend.down { color: var(--rose); }

  /* 部门详情卡片 */
  .dept-detail-card {
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-radius: 14px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .dept-detail-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border-dim);
    display: flex; align-items: center; gap: 16px;
  }

  .dept-avatar {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink:0;
  }

  .dept-info { flex:1; }
  .dept-name {
    font-size: 18px; font-weight: 700;
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 10px;
  }
  .dept-code {
    font-family: 'Space Grotesk', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    background: var(--bg-elevated);
    color: var(--text-muted);
    font-weight: 500;
  }

  .dept-meta {
    display: flex; gap: 16px;
    font-size: 12px; color: var(--text-secondary);
    margin-top: 2px;
  }
  .dept-meta span { display: flex; align-items: center; gap: 5px; }
  .dept-meta i { font-size: 11px; color: var(--text-muted); }

  .dept-detail-body {
    padding: 20px 24px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .detail-field label {
    display: block;
    font-size: 11px; color: var(--text-muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .detail-field .value {
    font-size: 13px; color: var(--text-primary);
    font-weight: 500;
  }

  /* Tab 切换 */
  .tab-bar {
    display: flex; gap: 0;
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-radius: 12px;
    margin-bottom: 20px;
    padding: 4px;
  }

  .tab-item {
    flex:1;
    text-align: center;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .tab-item:hover { color: var(--text-primary); }
  .tab-item.active {
    background: var(--accent-dim);
    color: var(--accent-light);
  }
  .tab-item .count {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--bg-elevated);
    color: var(--text-muted);
    font-weight: 600;
  }
  .tab-item.active .count {
    background: rgba(56,189,148,0.25);
    color: var(--accent-light);
  }

  /* 成员表格 */
  .member-table {
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-radius: 14px;
    overflow: hidden;
  }

  .member-table-header {
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border-dim);
  }

  .member-table-header h4 {
    font-size: 14px; font-weight: 600;
  }

  .btn {
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    display: inline-flex; align-items: center; gap: 5px;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-light); }
  .btn-ghost {
    background: var(--bg-elevated);
    color: var(--text-secondary);
    border: 1px solid var(--border-dim);
  }
  .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }

  table {
    width: 100%; border-collapse: collapse;
  }
  thead th {
    text-align: left;
    padding: 10px 20px;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border-dim);
    background: rgba(0,0,0,0.15);
  }
  tbody td {
    padding: 12px 20px;
    font-size: 13px;
    border-bottom: 1px solid var(--border-dim);
    color: var(--text-secondary);
  }
  tbody tr { transition: background 0.1s; }
  tbody tr:hover { background: var(--bg-hover); }
  tbody tr:last-child td { border-bottom: none; }

  .user-cell {
    display: flex; align-items: center; gap: 10px;
  }
  .user-avatar-sm {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    flex-shrink:0;
  }
  .user-name { color: var(--text-primary); font-weight: 500; }
  .user-email { font-size: 11px; color: var(--text-muted); }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
  }
  .tag-accent { background: var(--accent-dim); color: var(--accent-light); }
  .tag-amber { background: var(--amber-dim); color: var(--amber); }
  .tag-sky { background: var(--sky-dim); color: var(--sky); }
  .tag-violet { background: var(--violet-dim); color: var(--violet); }
  .tag-rose { background: var(--rose-dim); color: var(--rose); }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }
  .status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.offline { background: var(--text-muted); }

  /* 角色列表 */
  .role-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .role-card {
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-radius: 14px;
    padding: 20px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .role-card:hover {
    border-color: var(--border-subtle);
    transform: translateY(-1px);
  }

  .role-card-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .role-icon {
    width: 36px; height: 36px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .role-card-header h5 {
    font-size: 14px; font-weight: 600;
    color: var(--text-primary);
  }
  .role-card-header .role-type {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 5px;
    font-weight: 500;
    margin-left: auto;
  }

  .role-card-desc {
    font-size: 12px; color: var(--text-muted);
    margin-bottom: 14px;
    line-height: 1.5;
  }

  .role-card-stats {
    display: flex; gap: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border-dim);
  }
  .role-stat {
    font-size: 11px; color: var(--text-secondary);
  }
  .role-stat strong {
    display: block;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .data-scope-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
    margin-top: 8px;
  }

  /* 组织架构图 */
  .org-chart-container {
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-radius: 14px;
    padding: 24px;
    overflow-x: auto;
  }

  .org-chart {
    display: flex;
    justify-content: center;
    min-width: 700px;
  }

  .org-node {
    display: flex; flex-direction: column; align-items: center;
    position: relative;
  }

  .org-node-box {
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    padding: 10px 18px;
    text-align: center;
    min-width: 120px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .org-node-box:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(56,189,148,0.1);
  }
  .org-node-box.root {
    background: linear-gradient(135deg, rgba(56,189,148,0.15), rgba(56,189,148,0.05));
    border-color: var(--border-accent);
  }

  .org-node-name {
    font-size: 12px; font-weight: 600;
    color: var(--text-primary);
  }
  .org-node-count {
    font-size: 10px; color: var(--text-muted);
    margin-top: 2px;
  }

  .org-children {
    display: flex; gap: 24px;
    margin-top: 28px;
    position: relative;
    padding-top: 0;
  }

  .org-children::before {
    content:'';
    position: absolute;
    top: -14px;
    left: 50%;
    width: 1px; height: 14px;
    background: var(--border-subtle);
  }

  .org-children > .org-node::before {
    content:'';
    position: absolute;
    top: -14px;
    left: 50%;
    width: 1px; height: 14px;
    background: var(--border-subtle);
  }

  .org-children::after {
    content:'';
    position: absolute;
    top: -14px;
    height: 1px;
    background: var(--border-subtle);
  }

  /* 模态框 */
  .modal-overlay {
    position: fixed; inset:0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity:1; pointer-events: all; }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-radius: 16px;
    width: 480px;
    max-height: 80vh;
    overflow-y: auto;
    transform: translateY(10px) scale(0.98);
    transition: transform 0.2s;
  }
  .modal-overlay.show .modal { transform: translateY(0) scale(1); }

  .modal-header {
    padding: 20px 24px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border-dim);
  }
  .modal-header h3 { font-size: 16px; font-weight: 600; }
  .modal-close {
    width: 30px; height: 30px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    background: var(--bg-elevated);
    border: none;
    transition: all 0.15s;
  }
  .modal-close:hover { color: var(--text-primary); background: var(--bg-hover); }

  .modal-body { padding: 20px 24px; }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 12px; font-weight: 500; color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .form-input {
    width: 100%; height: 38px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-dim);
    border-radius: 8px;
    padding: 0 12px;
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--border-accent); }
  .form-select {
    width: 100%; height: 38px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-dim);
    border-radius: 8px;
    padding: 0 12px;
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    appearance: none;
    cursor: pointer;
  }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border-dim);
    display: flex; justify-content: flex-end; gap: 8px;
  }

  /* Toast */
  .toast-container {
    position: fixed; top: 20px; right: 20px;
    z-index: 2000;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    animation: toastIn 0.3s ease;
    min-width: 260px;
  }
  .toast.success { border-left: 3px solid var(--accent); }
  .toast.success i { color: var(--accent); }
  .toast.error { border-left: 3px solid var(--rose); }
  .toast.error i { color: var(--rose); }

  @keyframes toastIn {
    from { opacity:0; transform: translateX(40px); }
    to { opacity:1; transform: translateX(0); }
  }

  /* 空状态 */
  .empty-state {
    text-align: center; padding: 60px 20px;

  /* 动画 */

    from { opacity:0; transform: translateY(12px); }
    to { opacity:1; transform: translateY(0); }
  }
  .fade-in-up { animation: fadeInUp 0.4s ease forwards; }

  @media (prefers-reduced-motion: reduce) {

      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;

    animation: particleFloat 8s infinite ease-in-out;

// ========== 状态管理 ==========
let selectedDeptId = 1;
let activeTab = 'members';
let expandedNodes = new Set([1, 2, 6]);

// ========== 工具函数 ==========
function getDeptType(type) { return DEPT_TYPES[type] || DEPT_TYPES[6]; }
function getDataScope(scope) { return DATA_SCOPES[scope] || DATA_SCOPES[0]; }
function getRoleType(type) { return ROLE_TYPES[type] || ROLE_TYPES[2]; }

function getChildren(parentId) {
  return departments.filter(d => d.parentId === parentId).sort((a,b) => a.sort - b.sort);
}

function getAllDescendantIds(deptId) {
  const result = [];
  const children = getChildren(deptId);
  for (const child of children) {
    result.push(child.id);
    result.push(...getAllDescendantIds(child.id));
  }
  return result;
}

function getDeptMembers(deptId) {
  const ids = [deptId, ...getAllDescendantIds(deptId)];
  return members.filter(m => ids.includes(m.deptId));
}

function getDeptById(id) { return departments.find(d => d.id === id); }

function getInitials(name) {
  return name.substring(0, 1);
}

const avatarColors = [
  'var(--accent-dim)', 'var(--sky-dim)', 'var(--violet-dim)',
  'var(--amber-dim)', 'var(--rose-dim)'
];
function getAvatarColor(id) { return avatarColors[id % avatarColors.length]; }
const avatarTextColors = [
  'var(--accent-light)', 'var(--sky)', 'var(--violet)',
  'var(--amber)', 'var(--rose)'
];
function getAvatarTextColor(id) { return avatarTextColors[id % avatarTextColors.length]; }

// ========== 部门树渲染 ==========
function renderTree() {
  const container = document.getElementById('treeContainer');
  container.innerHTML = renderTreeNode(null, 0);
}

function renderTreeNode(parentId, level) {
  const children = getChildren(parentId);
  if (children.length === 0 && parentId !== null) return '';

  let html = '';
  for (const dept of children) {
    const hasChildren = getChildren(dept.id).length > 0;
    const isExpanded = expandedNodes.has(dept.id);
    const isActive = selectedDeptId === dept.id;
    const dt = getDeptType(dept.type);

    html += `
      <div class="tree-node ${isActive ? 'active' : ''}" data-id="${dept.id}">
        <div class="tree-node-content" onclick="selectDept(${dept.id})" style="padding-left:${level * 16 + 10}px">
          <div class="tree-toggle ${hasChildren ? (isExpanded ? 'expanded' : '') : 'empty'}" onclick="event.stopPropagation(); toggleNode(${dept.id})">
            <i class="fas fa-chevron-right" style="font-size:10px"></i>
          </div>
          <div class="tree-icon" style="background:${dt.bg};color:${dt.color}">
            <i class="fas ${dt.icon}"></i>
          </div>
          <span class="tree-label">${dept.name}</span>
          <span class="tree-badge" style="background:var(--bg-elevated);color:var(--text-muted)">${dept.memberCount}</span>
        </div>
        ${hasChildren ? `<div class="tree-children ${isExpanded ? 'open' : ''}">${renderTreeNode(dept.id, level + 1)}</div>` : ''}
      </div>
    `;
  }
  return html;
}

function toggleNode(id) {
  if (expandedNodes.has(id)) expandedNodes.delete(id);
  else expandedNodes.add(id);
  renderTree();
}

function selectDept(id) {
  selectedDeptId = id;
  expandedNodes.add(id);
  // 展开祖先
  let dept = getDeptById(id);
  while (dept && dept.parentId) {
    expandedNodes.add(dept.parentId);
    dept = getDeptById(dept.parentId);
  }
  renderTree();
  renderContent();
}

function filterTree(query) {
  // 简单搜索：展开所有匹配项
  if (!query.trim()) {
    renderTree();
    return;
  }
  const q = query.toLowerCase();
  // 展开包含匹配项的节点
  for (const dept of departments) {
    if (dept.name.toLowerCase().includes(q) || dept.code.toLowerCase().includes(q)) {
      expandedNodes.add(dept.id);
      let parent = getDeptById(dept.parentId);
      while (parent) {
        expandedNodes.add(parent.id);
        parent = getDeptById(parent.parentId);
      }
    }
  }
  renderTree();
}

// ========== 内容区渲染 ==========

      <div class="dept-detail-header">
        <div class="dept-avatar" style="background:${dt.bg};color:${dt.color}">
          <i class="fas ${dt.icon}"></i>
        </div>

      <div class="dept-detail-body">

        </div>

          <label>部门类型</label>
          <div class="value">${dt.label}</div>
        </div>

          <label>负责人</label>
          <div class="value">${dept.leaderId ? members.find(m=>m.id===dept.leaderId)?.name || '-' : '-'}</div>
        </div>

          <label>直属成员</label>
          <div class="value">${directMembers.length} 人</div>
        </div>

          <label>联系电话</label>

        </div>

          <div class="value">${dept.email || '-'}</div>
        </div>
        <div class="detail-field">
          <label>排序权重</label>
          <div class="value">${dept.sort}</div>
        </div>
        <div class="detail-field">
          <label>备注信息</label>
          <div class="value">${dept.remark || '-'}</div>
        </div>
      </div>
    </div>

    <!-- Tab 切换 -->
    <div class="tab-bar fade-in-up" style="animation-delay:0.1s">
      <div class="tab-item ${activeTab==='members'?'active':''}" onclick="switchTab('members')">
        <i class="fas fa-users"></i> 成员列表 <span class="count">${deptMembers.length}</span>
      </div>

      </div>
      <div class="tab-item ${activeTab==='chart'?'active':''}" onclick="switchTab('chart')">
        <i class="fas fa-diagram-project"></i> 组织架构
      </div>
      <div class="tab-item ${activeTab==='sub'?'active':''}" onclick="switchTab('sub')">
        <i class="fas fa-folder-tree"></i> 下级部门 <span class="count">${children.length}</span>

function switchTab(tab) {
  activeTab = tab;
  renderContent();
}

function renderTabContent(dept, deptMembers, children) {
  switch(activeTab) {
    case 'members': return renderMembersTab(dept, deptMembers);
    case 'roles': return renderRolesTab(deptMembers);
    case 'chart': return renderChartTab(dept);
    case 'sub': return renderSubDeptsTab(children);
    default: return '';
  }
}

function renderMembersTab(dept, deptMembers) {
  if (deptMembers.length === 0) {
    return `<div class="empty-state"><i class="fas fa-users-slash"></i><p>暂无成员</p></div>`;
  }

  const rows = deptMembers.map((m, i) => {
    const roleTags = m.roles.map(r => {
      const role = roles.find(rl => rl.name === r);
      const rt = role ? getRoleType(role.type) : { color:'var(--text-muted)', bg:'var(--bg-elevated)' };
      return `<span class="tag" style="background:${rt.bg};color:${rt.color}">${r}</span>`;
    }).join(' ');

    return `
      <tr>
        <td>
          <div class="user-cell">
            <div class="user-avatar-sm" style="background:${getAvatarColor(m.id)};color:${getAvatarTextColor(m.id)}">${getInitials(m.name)}</div>
            <div>
              <div class="user-name">${m.name}</div>
              <div class="user-email">${m.email}</div>
            </div>
          </div>
        </td>
        <td>${m.position}</td>
        <td>${roleTags}</td>
        <td><span class="status-dot ${m.status}"></span>${m.status === 'online' ? '在线' : '离线'}</td>

          <button class="btn btn-ghost" style="padding:4px 8px;font-size:11px" onclick="showToast('编辑 ${m.name}','success')">
            <i class="fas fa-pen" style="font-size:10px"></i>
          </button>
          <button class="btn btn-ghost" style="padding:4px 8px;font-size:11px" onclick="showToast('移除 ${m.name}','error')">
            <i class="fas fa-trash" style="font-size:10px;color:var(--rose)"></i>
          </button>
        </td>
      </tr>
    `;
  }).join('');

  return `
    <div class="member-table">
      <div class="member-table-header">
        <h4>成员列表</h4>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" onclick="showToast('导出功能开发中','success')">
            <i class="fas fa-file-export" style="font-size:11px"></i> 导出
          </button>
          <button class="btn btn-primary" onclick="openAddMember()">
            <i class="fas fa-user-plus" style="font-size:11px"></i> 添加成员
          </button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>成员</th>
            <th>职位</th>
            <th>角色</th>
            <th>状态</th>
            <th>电话</th>
            <th style="text-align:right">操作</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function renderRolesTab(deptMembers) {
  const usedRoles = [...new Set(deptMembers.flatMap(m => m.roles))];
  const deptRoles = roles.filter(r => usedRoles.includes(r.name));

  if (deptRoles.length === 0) {
    return `<div class="empty-state"><i class="fas fa-shield-halved"></i><p>暂无角色</p></div>`;
  }

  const cards = deptRoles.map(r => {
    const rt = getRoleType(r.type);
    const ds = getDataScope(r.dataScope);
    const roleMemberCount = members.filter(m => m.roles.includes(r.name)).length;

    return `
      <div class="role-card">
        <div class="role-card-header">
          <div class="role-icon" style="background:${rt.bg};color:${rt.color}">
            <i class="fas fa-shield-halved"></i>
          </div>
          <h5>${r.name}</h5>
          <span class="role-type tag" style="background:${rt.bg};color:${rt.color}">${rt.label}</span>
        </div>
        <div class="role-card-desc">${r.desc}</div>
        <div class="data-scope-tag" style="background:${ds.bg};color:${ds.color}">
          <i class="fas fa-database" style="font-size:9px"></i> 数据范围：${ds.label}
        </div>
        <div class="role-card-stats">
          <div class="role-stat">
            <strong>${roleMemberCount}</strong>成员
          </div>
          <div class="role-stat">
            <strong>${r.permissionCount}</strong>权限
          </div>
          <div class="role-stat">
            <strong>${r.maxMembers || '∞'}</strong>上限
          </div>
        </div>
      </div>
    `;
  }).join('');

  return `<div class="role-grid">${cards}</div>`;
}

function renderChartTab(dept) {
  function buildOrgHtml(deptId, isRoot) {
    const d = getDeptById(deptId);
    if (!d) return '';
    const children = getChildren(deptId);
    const dt = getDeptType(d.type);
    let childrenHtml = '';
    if (children.length > 0) {
      childrenHtml = `<div class="org-children">${children.map(c => `<div class="org-node">${buildOrgHtml(c.id, false)}</div>`).join('')}</div>`;
    }
    return `
      <div class="org-node-box ${isRoot ? 'root' : ''}">
        <div style="font-size:10px;color:${dt.color};margin-bottom:2px"><i class="fas ${dt.icon}" style="margin-right:3px"></i>${dt.label}</div>
        <div class="org-node-name">${d.name}</div>
        <div class="org-node-count">${d.memberCount} 人</div>
      </div>
      ${childrenHtml}
    `;
  }

  return `
    <div class="org-chart-container">
      <div style="text-align:center;margin-bottom:20px">
        <span style="font-size:14px;font-weight:600;color:var(--text-primary)">${dept.name} — 组织架构</span>
      </div>
      <div class="org-chart">
        <div class="org-node">${buildOrgHtml(dept.id, true)}</div>
      </div>
    </div>
  `;
}

function renderSubDeptsTab(children) {
  if (children.length === 0) {
    return `<div class="empty-state"><i class="fas fa-folder-open"></i><p>暂无下级部门</p></div>`;
  }

  const cards = children.map(c => {
    const dt = getDeptType(c.type);
    const leader = members.find(m => m.id === c.leaderId);
    const directCount = members.filter(m => m.deptId === c.id).length;

    return `
      <div class="role-card" style="cursor:pointer" onclick="selectDept(${c.id})">
        <div class="role-card-header">
          <div class="role-icon" style="background:${dt.bg};color:${dt.color}">
            <i class="fas ${dt.icon}"></i>
          </div>
          <div>
            <h5>${c.name}</h5>
            <div style="font-size:11px;color:var(--text-muted);font-family:'Space Grotesk',monospace">${c.code}</div>
          </div>
          <span class="tag" style="background:${dt.bg};color:${dt.color}">${dt.label}</span>
        </div>
        <div class="role-card-desc">${c.remark || '暂无描述'}</div>
        <div class="role-card-stats">
          <div class="role-stat">
            <strong>${c.memberCount}</strong>总人数
          </div>
          <div class="role-stat">
            <strong>${directCount}</strong>直属
          </div>
          <div class="role-stat">
            <strong>${leader ? leader.name : '-'}</strong>负责人
          </div>
        </div>
      </div>
    `;
  }).join('');

  return `<div class="role-grid">${cards}</div>`;
}

// ========== 模态框 ==========
function openModal(name) {
  document.getElementById(name + 'Modal').classList.add('show');
}

function closeModal(name) {
  document.getElementById(name + 'Modal').classList.remove('show');
}

function openAddMember() {
  const dept = getDeptById(selectedDeptId);
  document.getElementById('memberDeptInput').value = dept ? dept.name : '';
  // 填充角色选项
  const select = document.getElementById('memberRoleSelect');
  select.innerHTML = '<option value="">请选择角色</option>' + roles.map(r =>
    `<option value="${r.id}">${r.name}</option>`
  ).join('');
  openModal('addMember');
}

function addDepartment() {
  const name = document.getElementById('deptNameInput').value.trim();
  const code = document.getElementById('deptCodeInput').value.trim();
  if (!name || !code) {
    showToast('请填写部门名称和编码', 'error');
    return;
  }
  const parent = getDeptById(selectedDeptId);
  document.getElementById('parentDeptInput').value = parent ? parent.name : '无';
  const newId = departments.length + 1;
  departments.push({
    id: newId,
    parentId: selectedDeptId,
    name: name,
    code: code,
    type: parseInt(document.getElementById('deptTypeSelect').value),
    leaderId: null,
    phone: document.getElementById('phoneInput').value.trim(),
    email: '',
    address: '',
    status: 0,
    sort: getChildren(selectedDeptId).length,
    remark: '',
    memberCount: 0
  });
  expandedNodes.add(selectedDeptId);
  closeModal('addDept');
  // 清空表单
  document.getElementById('deptNameInput').value = '';
  document.getElementById('deptCodeInput').value = '';
  document.getElementById('phoneInput').value = '';
  document.getElementById('leaderInput').value = '';
  renderTree();
  renderContent();
  showToast(`部门「${name}」创建成功`, 'success');
}

function addMember() {
  const name = document.getElementById('memberNameInput').value.trim();
  const email = document.getElementById('memberEmailInput').value.trim();
  if (!name || !email) {
    showToast('请填写姓名和邮箱', 'error');
    return;
  }
  const newId = members.length + 1;
  const dept = getDeptById(selectedDeptId);
  const roleSelect = document.getElementById('memberRoleSelect');
  const roleObj = roles.find(r => r.id == roleSelect.value);
  members.push({
    id: newId,
    name: name,
    gender: 1,
    email: email,
    phone: document.getElementById('memberPhoneInput').value.trim(),
    deptId: selectedDeptId,
    deptName: dept ? dept.name : '',
    roles: roleObj ? [roleObj.name] : ['开发'],
    status: 'online',
    position: '新成员'
  });
  // 更新部门人数
  if (dept) dept.memberCount++;
  closeModal('addMember');
  document.getElementById('memberNameInput').value = '';
  document.getElementById('memberEmailInput').value = '';
  document.getElementById('memberPhoneInput').value = '';
  renderTree();
  renderContent();
  showToast(`成员「${name}」添加成功`, 'success');
}

// ========== Toast ==========
function showToast(msg, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(40px)';
    toast.style.transition = 'all 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

// ========== 浮动粒子 ==========
function initParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'floating-particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = (40 + Math.random() * 60) + '%';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.animationDuration = (6 + Math.random() * 6) + 's';
    const colors = ['var(--accent)', 'var(--sky)', 'var(--violet)'];
    p.style.background = colors[i % 3];
    container.appendChild(p);
  }
}
