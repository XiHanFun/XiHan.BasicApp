<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>用户管理系统 - RBAC多租户管理</title>
    <!-- 字体和额外样式（Naive UI 样式由 JS 注入） -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f2f6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 24px;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        .glass-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03), 0 2px 6px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
        }

        .page-header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>
    <div id="app"></div>

    <!-- 引入核心库（UMD 全局：Vue、naive） -->
    <script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/naive-ui@2.39.0/dist/index.prod.js"></script>

    <script>
        const { createApp, ref, computed, reactive, h, onMounted } = Vue;
        const {
            NConfigProvider,
            NButton,
            NSpace,
            NDataTable,
            NInput,
            NSelect,
            NForm,
            NFormItem,
            NModal,
            NPopconfirm,
            NTag,
            NSwitch,
            NPagination,
            NInputGroup,
            NInputGroupLabel,
            NDivider,
            NRadioGroup,
            NRadio,
            createDiscreteApi
        } = naive;

        const { message } = createDiscreteApi(['message']);

        // ======================== MOCK 数据模型 ========================
        // 基于实体：SysUser, SysTenant, SysRole, SysUserRole, SysTenantUser

        // 1. 租户列表 (对应 SysTenant)
        const mockTenants = [
            { id: 1, tenantCode: "zhihai", tenantName: "知海科技", status: "Normal" },
            { id: 2, tenantCode: "cxhl", tenantName: "创新互联", status: "Normal" },
            { id: 3, tenantCode: "demo", tenantName: "演示租户", status: "Suspended" }
        ];

        // 2. 角色列表 (对应 SysRole)
        const mockRoles = [
            { id: 101, roleCode: "super_admin", roleName: "超级管理员", roleType: "System", isGlobal: true },
            { id: 102, roleCode: "tenant_admin", roleName: "租户管理员", roleType: "Tenant", isGlobal: false },
            { id: 103, roleCode: "member", roleName: "普通成员", roleType: "Custom", isGlobal: false },
            { id: 104, roleCode: "auditor", roleName: "审计员", roleType: "Business", isGlobal: false },
            { id: 105, roleCode: "guest", roleName: "访客", roleType: "Custom", isGlobal: false }
        ];

        // 模拟部门 (可选展示)
        const mockDepartments = [
            { id: 10, name: "技术研发中心" },
            { id: 11, name: "市场销售部" },
            { id: 12, name: "人力资源部" }
        ];

        // 生成初始 mock 用户 (满足 SysUser + 关联租户/角色)
        const generateMockUsers = () => {
            return [
                {
                    id: 1001,
                    userName: "zhangwei",
                    realName: "张伟",
                    nickName: "伟哥",
                    email: "zhang.wei@zhihai.com",
                    phone: "13800138001",
                    gender: "Male",
                    status: "Enabled",      // EnableStatus.Enabled
                    isActive: true,          // 邮箱已验证
                    tenantId: 1,
                    tenantName: "知海科技",
                    roleIds: [101, 102],     // 超级管理员+租户管理员
                    roleNames: "超级管理员,租户管理员",
                    departmentId: 10,
                    departmentName: "技术研发中心",
                    lastLoginTime: "2026-05-18 14:23:11",
                    createdAt: "2025-01-10 09:00:00",
                    remark: "系统超级管理员"
                },
                {
                    id: 1002,
                    userName: "lina",
                    realName: "李娜",
                    nickName: "娜娜",
                    email: "li.na@cxhl.com",
                    phone: "13800138002",
                    gender: "Female",
                    status: "Enabled",
                    isActive: true,
                    tenantId: 2,
                    tenantName: "创新互联",
                    roleIds: [102, 103],
                    roleNames: "租户管理员,普通成员",
                    departmentId: 11,
                    departmentName: "市场销售部",
                    lastLoginTime: "2026-05-17 09:45:21",
                    createdAt: "2025-03-15 10:30:00",
                    remark: "市场部主管"
                },
                {
                    id: 1003,
                    userName: "wangqiang",
                    realName: "王强",
                    nickName: "强哥",
                    email: "wang.qiang@zhihai.com",
                    phone: "13800138003",
                    gender: "Male",
                    status: "Disabled",
                    isActive: true,
                    tenantId: 1,
                    tenantName: "知海科技",
                    roleIds: [103],
                    roleNames: "普通成员",
                    departmentId: 10,
                    departmentName: "技术研发中心",
                    lastLoginTime: "2026-04-30 16:12:03",
                    createdAt: "2025-06-20 11:15:00",
                    remark: "后端开发"
                },
                {
                    id: 1004,
                    userName: "zhao.yue",
                    realName: "赵悦",
                    nickName: "悦悦",
                    email: "zhao.yue@cxhl.com",
                    phone: "13800138004",
                    gender: "Female",
                    status: "Enabled",
                    isActive: false,   // 邮箱未验证
                    tenantId: 2,
                    tenantName: "创新互联",
                    roleIds: [103, 104],
                    roleNames: "普通成员,审计员",
                    departmentId: 12,
                    departmentName: "人力资源部",
                    lastLoginTime: null,
                    createdAt: "2026-02-01 14:20:00",
                    remark: "新员工，待激活"
                },
                {
                    id: 1005,
                    userName: "chen.hao",
                    realName: "陈浩",
                    nickName: "浩子",
                    email: "chen.hao@zhihai.com",
                    phone: "13800138005",
                    gender: "Male",
                    status: "Enabled",
                    isActive: true,
                    tenantId: 1,
                    tenantName: "知海科技",
                    roleIds: [103],
                    roleNames: "普通成员",
                    departmentId: 10,
                    departmentName: "技术研发中心",
                    lastLoginTime: "2026-05-16 11:02:44",
                    createdAt: "2025-09-10 09:45:00",
                    remark: "前端负责人"
                },
                {
                    id: 1006,
                    userName: "zhou.min",
                    realName: "周敏",
                    nickName: "敏敏",
                    email: "zhou.min@cxhl.com",
                    phone: "13800138006",
                    gender: "Female",
                    status: "Enabled",
                    isActive: true,
                    tenantId: 2,
                    tenantName: "创新互联",
                    roleIds: [104],
                    roleNames: "审计员",
                    departmentId: 11,
                    departmentName: "市场销售部",
                    lastLoginTime: "2026-05-15 18:22:09",
                    createdAt: "2025-11-01 08:30:00",
                    remark: "合规审计"
                }
            ];
        };

        // 全局角色和租户辅助
        const getRoleNamesByIds = (ids, allRoles) => {
            if (!ids || ids.length === 0) return "无角色";
            return ids.map(id => allRoles.find(r => r.id === id)?.roleName || `角色${id}`).join(',');
        };

        // 业务逻辑: 用户服务 Mock 类
        createApp({
            setup() {
                // 数据源
                const usersData = ref(generateMockUsers());
                const roles = ref([...mockRoles]);
                const tenants = ref([...mockTenants]);
                const departments = ref([...mockDepartments]);

                // UI 状态
                const loading = ref(false);
                const searchKeyword = ref('');
                const statusFilter = ref(null); // 筛选全部/启用/禁用

                // 分页
                const currentPage = ref(1);
                const pageSize = ref(10);

                // Modal 状态
                const showModal = ref(false);
                const modalTitle = ref('新建用户');
                const isEdit = ref(false);
                const formLoading = ref(false);

                // 表单模型 (对齐 SysUser 核心字段 + 关联)
                const formModel = reactive({
                    id: null,
                    userName: '',
                    realName: '',
                    email: '',
                    phone: '',
                    status: 'Enabled',
                    isActive: true,
                    tenantId: null,
                    roleIds: [],          // 存储角色ID数组
                    departmentId: null,
                    password: '',          // 新增/重置使用，mock不持久化密码hash但演示用
                    remark: ''
                });

                // 校验规则 (Naive UI)
                const rules = {
                    userName: { required: true, message: '请输入用户名', trigger: 'blur' },
                    realName: { required: true, message: '请输入真实姓名', trigger: 'blur' },
                    email: {
                        required: true, message: '请输入邮箱', trigger: 'blur', validator: (rule, value) => {
                            if (!value) return new Error('邮箱不能为空');
                            const emailReg = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                            if (!emailReg.test(value)) return new Error('邮箱格式不正确');
                            return true;
                        }
                    },
                    tenantId: { required: true, message: '请选择所属租户', trigger: 'change', type: 'number' },
                    roleIds: { required: true, message: '请至少选择一个角色', trigger: 'change', type: 'array' },
                    password: (rule, value) => {
                        if (!isEdit.value && (!value || value.trim() === '')) {
                            return new Error('新增用户必须设置密码');
                        }
                        return true;
                    }
                };

                // 过滤后的用户 (根据关键字/状态)
                const filteredUsers = computed(() => {
                    let result = [...usersData.value];
                    if (searchKeyword.value) {
                        const kw = searchKeyword.value.toLowerCase();
                        result = result.filter(u =>
                            u.userName.toLowerCase().includes(kw) ||
                            u.realName.toLowerCase().includes(kw) ||
                            u.email.toLowerCase().includes(kw)
                        );
                    }
                    if (statusFilter.value) {
                        result = result.filter(u => u.status === statusFilter.value);
                    }
                    return result;
                });

                // 分页后数据
                const paginatedUsers = computed(() => {
                    const start = (currentPage.value - 1) * pageSize.value;
                    const end = start + pageSize.value;
                    return filteredUsers.value.slice(start, end);
                });

                const totalCount = computed(() => filteredUsers.value.length);
                const pageCount = computed(() => Math.max(1, Math.ceil(totalCount.value / pageSize.value)));

                // 获取租户选项
                const tenantOptions = computed(() => tenants.value.map(t => ({
                    label: t.tenantName,
                    value: t.id
                })));

                // 角色选项
                const roleOptions = computed(() => roles.value.map(r => ({
                    label: r.roleName,
                    value: r.id
                })));

                const departmentOptions = computed(() => departments.value.map(d => ({
                    label: d.name,
                    value: d.id
                })));

                // 状态选项
                const statusOptions = [
                    { label: '启用', value: 'Enabled' },
                    { label: '禁用', value: 'Disabled' }
                ];

                // 打开新建弹窗
                const openCreateModal = () => {
                    isEdit.value = false;
                    modalTitle.value = '新建用户';
                    resetForm();
                    showModal.value = true;
                };

                // 打开编辑弹窗
                const openEditModal = (row) => {
                    isEdit.value = true;
                    modalTitle.value = '编辑用户';
                    formModel.id = row.id;
                    formModel.userName = row.userName;
                    formModel.realName = row.realName;
                    formModel.email = row.email;
                    formModel.phone = row.phone || '';
                    formModel.status = row.status;
                    formModel.isActive = row.isActive;
                    formModel.tenantId = row.tenantId;
                    formModel.roleIds = [...row.roleIds];
                    formModel.departmentId = row.departmentId || null;
                    formModel.remark = row.remark || '';
                    formModel.password = ''; // 编辑时不要求填密码，重置单独处理
                    showModal.value = true;
                };

                // 重置表单
                const resetForm = () => {
                    formModel.id = null;
                    formModel.userName = '';
                    formModel.realName = '';
                    formModel.email = '';
                    formModel.phone = '';
                    formModel.status = 'Enabled';
                    formModel.isActive = true;
                    formModel.tenantId = null;
                    formModel.roleIds = [];
                    formModel.departmentId = null;
                    formModel.remark = '';
                    formModel.password = '';
                };

                // 保存用户 (新增/编辑)
                const handleSaveUser = async () => {
                    // 简单校验必填
                    if (!formModel.userName || !formModel.realName || !formModel.email) {
                        message.error('请填写完整用户名、真实姓名、邮箱');
                        return;
                    }
                    if (!formModel.tenantId) {
                        message.error('请选择所属租户');
                        return;
                    }
                    if (formModel.roleIds.length === 0) {
                        message.error('请至少分配一个角色');
                        return;
                    }
                    if (!isEdit.value && !formModel.password) {
                        message.error('请输入初始密码');
                        return;
                    }

                    formLoading.value = true;
                    // 模拟异步保存
                    await new Promise(resolve => setTimeout(resolve, 500));

                    try {
                        if (isEdit.value) {
                            // 更新用户
                            const index = usersData.value.findIndex(u => u.id === formModel.id);
                            if (index !== -1) {
                                const oldUser = usersData.value[index];
                                const updatedUser = {
                                    ...oldUser,
                                    userName: formModel.userName,
                                    realName: formModel.realName,
                                    email: formModel.email,
                                    phone: formModel.phone,
                                    status: formModel.status,
                                    isActive: formModel.isActive,
                                    tenantId: formModel.tenantId,
                                    tenantName: tenants.value.find(t => t.id === formModel.tenantId)?.tenantName || '未知租户',
                                    roleIds: [...formModel.roleIds],
                                    roleNames: getRoleNamesByIds(formModel.roleIds, roles.value),
                                    departmentId: formModel.departmentId,
                                    departmentName: departments.value.find(d => d.id === formModel.departmentId)?.name || null,
                                    remark: formModel.remark,
                                };
                                usersData.value[index] = updatedUser;
                                message.success('用户信息已更新');
                            }
                        } else {
                            // 新增用户，生成雪花ID风格ID
                            const newId = Date.now() + Math.floor(Math.random() * 10000);
                            const tenantObj = tenants.value.find(t => t.id === formModel.tenantId);
                            const newUser = {
                                id: newId,
                                userName: formModel.userName,
                                realName: formModel.realName,
                                nickName: formModel.userName,
                                email: formModel.email,
                                phone: formModel.phone,
                                gender: "Unknown",
                                status: formModel.status,
                                isActive: formModel.isActive,
                                tenantId: formModel.tenantId,
                                tenantName: tenantObj?.tenantName || '租户',
                                roleIds: [...formModel.roleIds],
                                roleNames: getRoleNamesByIds(formModel.roleIds, roles.value),
                                departmentId: formModel.departmentId,
                                departmentName: departments.value.find(d => d.id === formModel.departmentId)?.name || null,
                                lastLoginTime: null,
                                createdAt: new Date().toISOString().slice(0, 19).replace('T', ' '),
                                remark: formModel.remark
                            };
                            usersData.value.unshift(newUser);
                            message.success('用户创建成功，初始密码已设定 (mock)');
                        }
                        showModal.value = false;
                        resetForm();
                        // 刷新分页回到第一页
                        currentPage.value = 1;
                    } catch (error) {
                        message.error('操作失败');
                    } finally {
                        formLoading.value = false;
                    }
                };

                // 删除用户
                const handleDeleteUser = async (row) => {
                    loading.value = true;
                    await new Promise(resolve => setTimeout(resolve, 400));
                    const idx = usersData.value.findIndex(u => u.id === row.id);
                    if (idx !== -1) {
                        usersData.value.splice(idx, 1);
                        message.success(`用户 ${row.userName} 已删除`);
                        if (paginatedUsers.value.length === 0 && currentPage.value > 1) {
                            currentPage.value--;
                        }
                    } else {
                        message.error('用户不存在');
                    }
                    loading.value = false;
                };

                // 重置密码 (mock)
                const handleResetPassword = async (row) => {
                    loading.value = true;
                    await new Promise(resolve => setTimeout(resolve, 500));
                    message.success(`用户 ${row.userName} 的密码已重置为随机强密码 (模拟操作)`);
                    loading.value = false;
                };

                // 切换用户状态 (启用/禁用)
                const handleToggleStatus = async (row) => {
                    const newStatus = row.status === 'Enabled' ? 'Disabled' : 'Enabled';
                    const idx = usersData.value.findIndex(u => u.id === row.id);
                    if (idx !== -1) {
                        usersData.value[idx] = { ...usersData.value[idx], status: newStatus };
                        message.info(`用户状态已变更为 ${newStatus === 'Enabled' ? '启用' : '禁用'}`);
                    }
                };

                // 刷新列表重置过滤
                const handleRefresh = () => {
                    searchKeyword.value = '';
                    statusFilter.value = null;
                    currentPage.value = 1;
                    message.info('列表已刷新');
                };

                // 表格列定义 (使用 Naive UI DataTable)
                const columns = [
                    { title: '用户名', key: 'userName', width: 120, ellipsis: true, fixed: 'left' },
                    { title: '真实姓名', key: 'realName', width: 110 },
                    { title: '邮箱', key: 'email', width: 180, ellipsis: true },
                    { title: '手机号', key: 'phone', width: 130 },
                    { title: '所属租户', key: 'tenantName', width: 130 },
                    {
                        title: '角色', key: 'roleNames', width: 170, ellipsis: true, render(row) {
                            const tags = row.roleNames.split(',').map(r => r.trim());
                            return h(NSpace, { size: 'small', wrap: true }, tags.map(tag =>
                                h(NTag, { type: 'info', size: 'small', bordered: false }, tag)
                            ));
                        }
                    },
                    { title: '部门', key: 'departmentName', width: 120, render(row) { return row.departmentName || '-'; } },
                    {
                        title: '状态', key: 'status', width: 100, render(row) {
                            return h(NSwitch, {
                                value: row.status === 'Enabled',
                                loading: loading.value,
                                onUpdateValue: () => handleToggleStatus(row),
                                rubberBand: true,
                                checkedValue: true,
                                uncheckedValue: false
                            }, {
                                checked: () => '启用',
                                unchecked: () => '禁用'
                            });
                        }
                    },
                    {
                        title: '邮箱验证', key: 'isActive', width: 100, render(row) {
                            return row.isActive ?
                                h(NTag, { type: 'success', size: 'small' }, { default: () => '已验证' }) :
                                h(NTag, { type: 'warning', size: 'small' }, { default: () => '未验证' });
                        }
                    },
                    { title: '最后登录', key: 'lastLoginTime', width: 160, render(row) { return row.lastLoginTime || '从未登录'; } },
                    {
                        title: '操作', key: 'actions', width: 220, fixed: 'right', render(row) {
                            return h(NSpace, { size: 'small' }, [
                                h(NButton, { size: 'small', strong: true, tertiary: true, onClick: () => openEditModal(row) },
                                    { default: () => '编辑' }),
                                h(NButton, { size: 'small', tertiary: true, onClick: () => handleResetPassword(row) },
                                    { default: () => '重置密码' }),
                                h(NPopconfirm, {
                                    onPositiveClick: () => handleDeleteUser(row),
                                    positiveButtonProps: { type: 'error' }
                                }, {
                                    trigger: () => h(NButton, { size: 'small', type: 'error', ghost: true }, { default: () => '删除' }),
                                    default: () => '确定删除该用户吗？'
                                })
                            ]);
                        }
                    }
                ];

                // 监听搜索更新分页
                const handleSearch = () => {
                    currentPage.value = 1;
                };

                onMounted(() => {
                    // 初始消息
                });

                // 提供表格操作渲染
                return {
                    usersData,
                    roles,
                    tenants,
                    loading,
                    searchKeyword,
                    statusFilter,
                    currentPage,
                    pageSize,
                    showModal,
                    modalTitle,
                    isEdit,
                    formLoading,
                    formModel,
                    rules,
                    columns,
                    filteredUsers,
                    paginatedUsers,
                    totalCount,
                    pageCount,
                    tenantOptions,
                    roleOptions,
                    departmentOptions,
                    statusOptions,
                    openCreateModal,
                    openEditModal,
                    handleSaveUser,
                    handleRefresh,
                    handleSearch,
                    handleDeleteUser,
                    handleResetPassword,
                    handleToggleStatus,
                    // 分页事件
                    onPageChange: (page) => currentPage.value = page,
                    onPageSizeChange: (size) => { pageSize.value = size; currentPage.value = 1; }
                };
            },
            template: `
                <NConfigProvider>
                        <div style="max-width: 1600px; margin: 0 auto;">
                            <div class="glass-card" style="padding: 24px 28px;">
                                <!-- 头部区域 -->
                                <div class="page-header">
                                    <div>
                                        <h2 style="font-weight: 600; background: linear-gradient(135deg, #1e2b3c, #2c5a6e); background-clip: text; -webkit-background-clip: text; color: transparent;">👥 用户管理中心</h2>
                                        <p style="color: #5b6e8c; margin-top: 4px; font-size: 14px;">基于 RBAC 多租户架构 · 用户/租户/角色一体化管理</p>
                                    </div>
                                    <NSpace align="center">
                                        <NButton type="primary" @click="openCreateModal" strong secondary>
                                            <template #icon><NIcon><AddOutline /></NIcon></template>
                                            新建用户
                                        </NButton>
                                        <NButton quaternary circle @click="handleRefresh">
                                            <template #icon><NIcon><RefreshOutline /></NIcon></template>
                                        </NButton>
                                    </NSpace>
                                </div>
                                <NDivider style="margin: 16px 0 20px 0;" />
                                <!-- 筛选栏 -->
                                <NSpace justify="space-between" align="center" style="margin-bottom: 20px; flex-wrap: wrap;">
                                    <NSpace size="medium">
                                        <NInputGroup style="width: 280px;">
                                            <NInputGroupLabel>🔍</NInputGroupLabel>
                                            <NInput v-model:value="searchKeyword" placeholder="用户名/姓名/邮箱" clearable @input="handleSearch" />
                                        </NInputGroup>
                                        <NSelect v-model:value="statusFilter" placeholder="全部状态" :options="[{ label: '全部', value: null }, { label: '启用', value: 'Enabled' }, { label: '禁用', value: 'Disabled' }]" style="width: 130px" clearable @update:value="handleSearch" />
                                    </NSpace>
                                    <div style="color: #6c7a8e; font-size: 13px;">共 {{ totalCount }} 位用户</div>
                                </NSpace>
                                
                                <!-- 表格区域 -->
                                <NDataTable 
                                    :columns="columns" 
                                    :data="paginatedUsers" 
                                    :loading="loading"
                                    :bordered="false"
                                    :striped="true"
                                    :scroll-x="1400"
                                    remote
                                    style="border-radius: 16px; overflow: hidden;"
                                />
                                
                                <!-- 分页 -->
                                <div style="display: flex; justify-content: flex-end; margin-top: 24px;">
                                    <NPagination 
                                        v-model:page="currentPage" 
                                        :page-count="Math.ceil(totalCount / pageSize)" 
                                        :page-size="pageSize"
                                        :item-count="totalCount"
                                        @update:page="onPageChange"
                                        @update:page-size="onPageSizeChange"
                                        show-size-picker
                                        :page-sizes="[10, 20, 50]"
                                    />
                                </div>
                            </div>
                        </div>
                        
                        <!-- 用户编辑/新建弹窗 Modal -->
                        <NModal 
                            v-model:show="showModal" 
                            preset="card" 
                            :title="modalTitle"
                            style="width: 680px; max-width: 90vw;"
                            :mask-closable="false"
                            :bordered="false"
                        >
                            <NForm 
                                :model="formModel" 
                                :rules="rules"
                                label-placement="left"
                                label-width="100px"
                                require-mark-placement="right-hanging"
                            >
                                <NFormItem label="用户名" path="userName">
                                    <NInput v-model:value="formModel.userName" placeholder="登录账号" :disabled="isEdit" />
                                </NFormItem>
                                <NFormItem label="真实姓名" path="realName">
                                    <NInput v-model:value="formModel.realName" placeholder="姓名" />
                                </NFormItem>
                                <NFormItem label="邮箱" path="email">
                                    <NInput v-model:value="formModel.email" placeholder="example@company.com" />
                                </NFormItem>
                                <NFormItem label="手机号" path="phone">
                                    <NInput v-model:value="formModel.phone" placeholder="手机号码" />
                                </NFormItem>
                                <NFormItem label="所属租户" path="tenantId">
                                    <NSelect v-model:value="formModel.tenantId" :options="tenantOptions" placeholder="选择租户" />
                                </NFormItem>
                                <NFormItem label="分配角色" path="roleIds">
                                    <NSelect v-model:value="formModel.roleIds" :options="roleOptions" multiple placeholder="至少选择一个角色" />
                                </NFormItem>
                                <NFormItem label="部门" path="departmentId">
                                    <NSelect v-model:value="formModel.departmentId" :options="departmentOptions" clearable placeholder="可选部门" />
                                </NFormItem>
                                <NFormItem label="状态" path="status">
                                    <NSpace>
                                        <NRadioGroup v-model:value="formModel.status">
                                            <NRadio value="Enabled">启用</NRadio>
                                            <NRadio value="Disabled">禁用</NRadio>
                                        </NRadioGroup>
                                    </NSpace>
                                </NFormItem>
                                <NFormItem label="邮箱验证" path="isActive">
                                    <NSwitch v-model:value="formModel.isActive" :checked-value="true" :unchecked-value="false">
                                        <template #checked>已验证</template>
                                        <template #unchecked>未验证</template>
                                    </NSwitch>
                                </NFormItem>
                                <NFormItem label="密码" path="password" v-if="!isEdit || (isEdit && formModel.password)">
                                    <NInput v-model:value="formModel.password" type="password" show-password-on="click" :placeholder="isEdit ? '留空则不修改密码' : '请输入初始密码'" />
                                </NFormItem>
                                <NFormItem label="备注" path="remark">
                                    <NInput v-model:value="formModel.remark" type="textarea" placeholder="选填" />
                                </NFormItem>
                            </NForm>
                            <template #footer>
                                <NSpace justify="end">
                                    <NButton @click="showModal = false">取消</NButton>
                                    <NButton type="primary" :loading="formLoading" @click="handleSaveUser">保存</NButton>
                                </NSpace>
                            </template>
                        </NModal>
                    </NMessageProvider>
                </NConfigProvider>
            `
        }).use(naive).mount('#app');
    </script>
</body>

</html>
